<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FuelFinder V2.1 Tests</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
        }

        .pass {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>running V2.1 tests...</h1>
    <div id="results"></div>

    <script src="js/app.js"></script>
    <script>
        const results = document.getElementById('results');
        let passed = 0;
        let failed = 0;

        function assert(condition, message) {
            const div = document.createElement('div');
            if (condition) {
                div.className = 'pass';
                div.textContent = `[PASS] ${message}`;
                passed++;
            } else {
                div.className = 'fail';
                div.textContent = `[FAIL] ${message}`;
                failed++;
            }
            results.appendChild(div);
        }

        function runTests() {
            // Test 1: Create Station with Base64 mock
            const testId = 'test_edit_' + Date.now();
            const mockBase64 = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKwITAAAAABJRU5ErkJggg=='; // Red dot

            db.addStation({
                id: testId, name: 'Original Name', imageUrl: mockBase64, stock: [{ id: 'p92', price: 100, available: true }]
            });

            let s = db.getStationById(testId);
            assert(s.imageUrl === mockBase64, 'Station should save Base64 image');

            // Test 2: Edit Station Name
            const updateSuccess = db.updateStation({
                id: testId,
                name: 'Updated Name',
                imageUrl: s.imageUrl // Keep same image
            });
            assert(updateSuccess, 'Update should return true');

            s = db.getStationById(testId);
            assert(s.name === 'Updated Name', 'Station name should be updated');
            assert(s.stock.length > 0, 'Stock data should be preserved during update');

            // Test 3: Edit Station Image
            const newBase64 = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=='; // Different dot
            db.updateStation({
                id: testId,
                imageUrl: newBase64
            });
            s = db.getStationById(testId);
            assert(s.imageUrl === newBase64, 'Station image should be updated');

            // Cleanup
            db.deleteStation(testId);

            // Summary
            results.innerHTML += `<br><strong>Total: ${passed} Passed, ${failed} Failed</strong>`;
        }

        setTimeout(runTests, 500);
    </script>
</body>

</html>

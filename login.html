<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FuelFinder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                ⛽ FuelFinder
            </a>
        </div>
    </nav>

    <div class="container" style="max-width: 400px; margin-top: 4rem;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">One Account Access</h2>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username / Email</label>
                    <input type="text" id="username" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-container" style="position: relative;">
                        <input type="password" id="password" class="form-control" required style="padding-right: 40px;">
                        <span id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; user-select: none;">
                            👁️
                        </span>
                    </div>
                </div>

                <div id="errorMessage"
                    style="color: var(--danger-red); text-align: center; margin-bottom: 15px; display: none;">
                    Invalid credentials
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <div style="margin-top: 15px; text-align: center; font-size: 0.9rem; color: #666;">
                <p>Public users do not need to login.</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Toggle the icon (optional, could switch to crossed eye 🙈/👁️ if desired, keeping simple for now)
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            // Hardcoded check for demo if localstorage is empty/corrupt, 
            // but relying on MockDB is better.
            const authenticatedUser = Auth.login(user, pass);

            if (authenticatedUser) {
                if (authenticatedUser.role === 'admin') {
                    window.location.href = 'admin.html';
                } else if (authenticatedUser.role === 'manager') {
                    window.location.href = 'manager.html';
                }
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Invalid username or password.';
            }
        });
    </script>
</body>

</html>
